<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads 视频提取器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 1.1em;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .video-list {
            margin-top: 20px;
        }

        .video-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-info {
            flex: 1;
        }

        .video-url {
            word-break: break-all;
            color: #495057;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .video-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: none;
            color: white;
            transition: background-color 0.3s;
        }

        .btn-copy {
            background: #17a2b8;
        }

        .btn-copy:hover {
            background: #138496;
        }

        .btn-download {
            background: #28a745;
        }

        .btn-download:hover {
            background: #218838;
        }

        .btn-download.downloading {
            background: #6c757d;
            cursor: not-allowed;
        }

        .btn-download.downloading:hover {
            background: #6c757d;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Threads 视频提取器</h1>
            <p>输入 Threads 贴文链接，一键提取视频下载地址</p>
        </div>

        <form id="extractForm">
            <div class="form-group">
                <label for="threadUrl">Threads 贴文链接:</label>
                <input type="url" id="threadUrl" name="threadUrl" 
                       placeholder="https://www.threads.com/@username/post/..." 
                       required>
            </div>
            <button type="submit" class="btn" id="extractBtn">
                🔍 提取视频链接
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在提取视频链接，请稍候...</p>
        </div>

        <div class="result" id="result">
            <div id="resultMessage"></div>
            <div class="video-list" id="videoList"></div>
        </div>

        <div class="footer">
            <p>支持提取 Threads 平台的视频内容 • 请遵守平台使用条款</p>
        </div>
    </div>

    <script>
        document.getElementById('extractForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const url = document.getElementById('threadUrl').value.trim();
            const extractBtn = document.getElementById('extractBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const resultMessage = document.getElementById('resultMessage');
            const videoList = document.getElementById('videoList');
            
            if (!url) {
                showResult(false, '请输入有效的 Threads 链接');
                return;
            }
            
            // 显示加载状态
            extractBtn.disabled = true;
            extractBtn.textContent = '🔄 处理中...';
            loading.style.display = 'block';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult(true, data.message);
                    displayVideos(data.videos);
                } else {
                    showResult(false, data.message);
                }
            } catch (error) {
                showResult(false, '网络错误，请重试');
            } finally {
                // 恢复按钮状态
                extractBtn.disabled = false;
                extractBtn.textContent = '🔍 提取视频链接';
                loading.style.display = 'none';
            }
        });
        
        function showResult(success, message) {
            const result = document.getElementById('result');
            const resultMessage = document.getElementById('resultMessage');
            
            result.className = success ? 'result success' : 'result error';
            result.style.display = 'block';
            resultMessage.textContent = message;
            
            if (!success) {
                document.getElementById('videoList').innerHTML = '';
            }
        }
        
        function displayVideos(videos) {
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = '';
            
            videos.forEach((video, index) => {
                const videoItem = document.createElement('div');
                videoItem.className = 'video-item';
                
                const encodedUrl = encodeURIComponent(video);
                const downloadUrl = `/download?url=${encodedUrl}&index=${index + 1}`;
                
                videoItem.innerHTML = `
                    <div class="video-info">
                        <div class="video-url">视频 ${index + 1}: ${video.substring(0, 100)}...</div>
                    </div>
                    <div class="video-actions">
                        <button class="btn-small btn-copy" onclick="copyToClipboard('${video}')">
                            📋 复制链接
                        </button>
                        <button class="btn-small btn-download" onclick="downloadVideo('${downloadUrl}', ${index + 1})">
                            💾 下载
                        </button>
                    </div>
                `;
                
                videoList.appendChild(videoItem);
            });
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('链接已复制到剪贴板', 'success');
            }).catch(() => {
                showToast('复制失败，请手动复制', 'error');
            });
        }
        
        function downloadVideo(downloadUrl, index) {
            // 获取下载按钮
            const downloadBtn = event.target;
            const originalText = downloadBtn.textContent;
            
            // 更新按钮状态
            downloadBtn.classList.add('downloading');
            downloadBtn.textContent = '⏳ 下载中...';
            downloadBtn.disabled = true;
            
            // 创建一个隐藏的链接来触发下载
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.download = `threads_video_${index}.mp4`;
            link.style.display = 'none';
            
            // 添加到DOM，点击，然后移除
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 显示下载提示
            showToast(`视频 ${index} 开始下载...`, 'success');
            
            // 3秒后恢复按钮状态
            setTimeout(() => {
                downloadBtn.classList.remove('downloading');
                downloadBtn.textContent = originalText;
                downloadBtn.disabled = false;
            }, 3000);
        }
        
        function showToast(message, type = 'info') {
            // 创建toast元素
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#d4edda' : '#f8d7da'};
                color: ${type === 'success' ? '#155724' : '#721c24'};
                padding: 15px 20px;
                border-radius: 5px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            
            document.body.appendChild(toast);
            
            // 3秒后自动消失
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-in';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
